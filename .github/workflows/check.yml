name: check

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  static-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run static baseline
        run: make check
